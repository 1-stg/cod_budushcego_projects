<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Сумка Гермионы</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="css/index.css" />
    <script src="js/index.js" defer></script>
  </head>

  <body>
    <div class="container" id="login-page">
        <div class="row g-3 mb-5 justify-content-center">
          <div class="col-md-5">
            <h1 class="my-heading my-5 text-center">Сумка</h1>
            <div>
              <label for="search" class="form-label">Что ты ищешь?</label>
              <div class="input-group has-validation">
                <span class="input-group-text">Акцио,</span>
                <input id="search" type="text" class="form-control" autocomplete="off">
                <button id="button"  class="btn btn-outline-primary" type="button" >Искать</button>
  
                <div id="invalid" class="invalid-feedback">
                  Увы, такого предмета в сумке нет
                </div>
                <div id="valid" class="valid-feedback">
                  Лови!
                </div>
              </div>
            </div>
            <div>
              <img id="image" class="">
            </div>
          </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>

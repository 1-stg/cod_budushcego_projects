<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <title>Бард</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous" />
  <link rel="stylesheet" href="css/index.css">
  <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
  <script src="js/index.js" defer></script>
</head>

<body>

  <body>
    <!-- Здесь будет всё наше приложение -->
    <div id="app">
      <div class="container  vh-100 p-3">
        <div id="cards" class="row justify-content-center align-items-center">
          <!-- Заполни арточку персонажа через шаблонизаци vue. Используй {{ }} -->
          <div class="card mb-3">
            <div class="row g-0">
              <div class="col-md-4">
                <img src="assets/bard.png" class="img-fluid rounded-start">
              </div>
              <div class="col-md-8">
                <div class="card-body">
                  <h5 class="card-title">{{ username ?? "Неизвестно" }}</h5>
                  <p class="card-text">
                    Возраст: <span>{{ age }}</span><br>
                    Класс: <span>{{ role }}</span><br>
                    Способности: <span>{{ ability }}</span>
                  </p>
                  <p class="coins card-text" >В кармане {{ money }} золотых</p>
                  <button type="button" @click="fire">Получить денег</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</body>

</html>

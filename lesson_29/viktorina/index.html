<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous"> -->
  <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
  <title>Vue.js Test</title>
  <style>
    #app {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .test .answers {
      display: flex;
      gap: 20px;
      margin-bottom: 10px;
    }

    button {
      border: none;
      outline: 2px solid black;
      outline-offset: -2px;
      padding: 10px 15px;
      border-radius: 15px;
      background: white;
      cursor: pointer;
    }

    button:hover {
      outline: none;
      outline-offset: -2px;
      color: white;
      background: black;
      transition: all 0.2s ease-in-out;
    }

    button:active {
      transform: scale(0.9);
      opacity: 0.9;
      transition: all 0.2s ease-in-out;
    }

    .countContainer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /*  */
  </style>

</head>

<body>
  <div id="app">
    <div class="test">
      <p>В каком году был создан Javascript?</p>

      <div class="answers">
        <button @click="wrong">1993</button>
        <button @click="wrong">1994</button>
        <button @click="right">1995</button>
        <button @click="wrong">1996</button>
      </div>

      <p class="result">
        {{answer}}
      </p>

      <button type="button" @click="changeLang">{{ lang }}</button>
      <h2>{{text}}</h2>

      <div class="countContainer">
        <button type="button" @click="minus">Назад</button>
        <p>{{products[count]}}</p>
        <button type="button" @click="plus">Вперёд</button>
      </div>

    </div>
  </div>
</body>

<script>
  let app = new Vue({
    el: `#app`,
    data: {
      answer: "Выбери ответ",
      lang: "RU",
      text: "Русский",
      products: ["Книги", "Электроника", "Одежда"],
      count: 0,
    },
    methods: {
      right() {
        this.answer = "Верно";
      },
      wrong() {
        this.answer = "Неверно";
      },
      changeLang() {
        this.lang = this.lang == "RU" ? "EN" : "RU";
        this.text = this.lang == "RU" ? "Русский" : "English";
      },
      plus() {
        this.count++;
        if (this.count == this.products.length) {
          this.count = 0;
        }
      },
      minus() {
        this.count--;
        if (this.count < 0) {
          this.count = this.products.length - 1;
        }
      }
    }
  })
</script>

</html>
